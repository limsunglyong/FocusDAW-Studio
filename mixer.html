<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mixer-FocusDAW Studio</title>
<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#1b1712; --bg2:#221d17; --surface:#2a2520; --surface2:#332e27; --surface3:#3d362d;
  --line:rgba(232,212,170,.10); --line-strong:rgba(232,212,170,.18);
  --cream:#efe6d4; --cream-2:#d8cdb6; --dim:#b0a690; --muted:#857c6b; --faint:#5f574a;
  --amber:#e8b04b; --amber-deep:#c8893a; --amber-soft:rgba(232,176,75,.16);
  --green:#94c06a; --green-deep:#6e9a48; --red:#d96a4e; --blue:#7fb0c4; --violet:#c98fb0;
  --shadow:0 18px 50px -18px rgba(0,0,0,.7);
  --ui:"Space Grotesk",system-ui,sans-serif; --mono:"Space Mono",ui-monospace,monospace;
  --r:10px;
  --mixer-bar-bg:linear-gradient(#efe7d6,#e3d8c0); --mixer-bar-fg:#241a0a;
  /* dark themes: black ARM-on text + dark brushed metal */
  --arm-on-fg:#0d0d0d;
  --mixer-metal:color-mix(in srgb,var(--surface) 54%,#000 46%);
  --audio-input-port-bg:#241f1a;
  --audio-input-port-bg-hover:#2a2520;
  --audio-input-port-checked:#302a23;
  --audio-input-port-fg:var(--cream-2);
  --audio-input-button-fg:var(--muted);
  --audio-input-button-active-fg:var(--amber);
  --input-gain-led:var(--dim);
  --input-gain-led-glow:rgba(255,255,255,.6);
  --input-gain-arm-glow-core:#ff1730;
  --input-gain-arm-glow-outer:#c9001b;
  --input-gain-arm-button:#e33a48;
  --transport-active-bg:linear-gradient(180deg,var(--amber),var(--amber-deep));
  --transport-active-fg:#241a0a; --transport-active-border:var(--amber);
  --transport-active-shadow:0 0 12px var(--amber-soft), inset 0 1px 0 rgba(255,255,255,.24);
}
:root[data-theme="ivory"]{
  --bg:#e4dcc8; --bg2:#dad0b8; --surface:#f0ead9; --surface2:#e2dac3; --surface3:#d4caac;
  --line:rgba(95,75,42,.15); --line-strong:rgba(95,75,42,.26);
  --cream:#3b3327; --cream-2:#6e6149; --dim:#8a7d62; --muted:#9a8c6e; --faint:#c8bb9a;
  --amber:#bf7f2e; --amber-deep:#9e6620; --amber-soft:rgba(191,127,46,.14);
  --green:#7c9a4f; --green-deep:#5e7a38; --red:#c2593b; --blue:#5f86a6; --violet:#a0668a;
  --shadow:0 18px 50px -18px rgba(0,0,0,.22);
  --mixer-bar-bg:linear-gradient(#2a2520,#221d17); --mixer-bar-fg:#efe6d4;
  --pan-arc:#c9a227;
  /* light theme: keep white ARM-on text + lighter brushed metal */
  --arm-on-fg:#fff;
  --mixer-metal:color-mix(in srgb,var(--surface2) 85%,#000 15%);
  --audio-input-port-fg:#efe6d4;
  --audio-input-button-fg:#5f5137;
  --audio-input-button-active-fg:#805116;
  --input-gain-led:#fff3bf;
  --input-gain-led-glow:rgba(255,243,191,.95);
}
:root[data-theme="blue"]{
  --bg:#142841; --bg2:#1c3556; --surface:#274665; --surface2:#33567b; --surface3:#3f6791;
  --line:rgba(180,205,235,.14); --line-strong:rgba(180,205,235,.24);
  --cream:#eaf1fb; --cream-2:#a7b8d0; --dim:#8fa5bf; --muted:#6f82a0; --faint:#4d6680;
  --amber:#5b9bd5; --amber-deep:#3a7bbf; --amber-soft:rgba(91,155,213,.16);
  --green:#3fb985; --green-deep:#2a9068; --red:#e8654a; --blue:#7fb9e8; --violet:#c085c8;
  --shadow:0 18px 50px -18px rgba(0,0,0,.8);
  --mixer-bar-bg:linear-gradient(#9cccf2,#6fb0e6); --mixer-bar-fg:#0f2640;
  --audio-input-port-bg:#203a57;
  --audio-input-port-bg-hover:#274665;
  --audio-input-port-checked:#2b4d70;
}
:root[data-theme="forest"]{
  --bg:#1b1234; --bg2:#231942; --surface:#352a58; --surface2:#5E548E; --surface3:#7568a1;
  --line:rgba(224,177,203,.14); --line-strong:rgba(190,149,196,.28);
  --cream:#f4e8f1; --cream-2:#E0B1CB; --dim:#BE95C4; --muted:#9F86C0; --faint:#5E548E;
  --amber:#E0B1CB; --amber-deep:#BE95C4; --amber-soft:rgba(224,177,203,.18);
  --green:#BE95C4; --green-deep:#9F86C0; --red:#e98aae; --blue:#9F86C0; --violet:#E0B1CB;
  --shadow:0 18px 50px -18px rgba(0,0,0,.85);
  --mixer-bar-bg:linear-gradient(#E0B1CB,#BE95C4); --mixer-bar-fg:#231942;
  --audio-input-port-bg:#2b204d;
  --audio-input-port-bg-hover:#352a58;
  --audio-input-port-checked:#4a3d73;
}
:root[data-theme="arctic"]{
  --bg:#041426; --bg2:#022E51; --surface:#12385a; --surface2:#1e4667; --surface3:#2f5876;
  --line:rgba(163,180,200,.15); --line-strong:rgba(204,109,61,.26);
  --cream:#dbe5ef; --cream-2:#A3B4C8; --dim:#8399b4; --muted:#687f9d; --faint:#314f6f;
  --amber:#CC6D3D; --amber-deep:#B74803; --amber-soft:rgba(204,109,61,.18);
  --green:#A3B4C8; --green-deep:#6f849e; --red:#d86d54; --blue:#A3B4C8; --violet:#8da1ba;
  --shadow:0 18px 50px -18px rgba(0,0,0,.85);
  --mixer-bar-bg:linear-gradient(#CC6D3D,#B74803); --mixer-bar-fg:#061426;
}
:root[data-theme="lime"]{
  --bg:#0c0e0a; --bg2:#151a11; --surface:#1a1e15; --surface2:#20261b; --surface3:#283121;
  --line:rgba(163,230,53,.12); --line-strong:rgba(163,230,53,.22);
  --cream:#e4ead8; --cream-2:#c2c9b4; --dim:#8d9a7d; --muted:#67725b; --faint:#4a533f;
  --amber:#a3e635; --amber-deep:#6fa80f; --amber-soft:rgba(163,230,53,.16);
  --green:#bef264; --green-deep:#84cc16; --red:#ffb4ab; --blue:#bacac3; --violet:#96a69f;
  --shadow:0 18px 50px -18px rgba(0,0,0,.9);
  --mixer-bar-bg:linear-gradient(#d9ff7a,#a3e635); --mixer-bar-fg:#182404;
}
:root[data-theme="slate"]{
  --bg:#020617; --bg2:#0f172a; --surface:#111827; --surface2:#1e293b; --surface3:#334155;
  --line:rgba(148,163,184,.14); --line-strong:rgba(148,163,184,.26);
  --cream:#f8fafc; --cream-2:#cbd5e1; --dim:#94a3b8; --muted:#64748b; --faint:#475569;
  --amber:#e2e8f0; --amber-deep:#cbd5e1; --amber-soft:rgba(226,232,240,.14);
  --green:#94a3b8; --green-deep:#64748b; --red:#fca5a5; --blue:#cbd5e1; --violet:#94a3b8;
  --shadow:0 18px 50px -18px rgba(0,0,0,.9);
  --mixer-bar-bg:linear-gradient(#e2e8f0,#cbd5e1); --mixer-bar-fg:#0f172a;
}
:root[data-theme="sage"]{
  --bg:#f7f9f8; --bg2:#eef4f1; --surface:#e7ece9; --surface2:#e1e8e4; --surface3:#d5ded9;
  --line:rgba(63,73,69,.15); --line-strong:rgba(63,73,69,.26);
  --cream:#191c1a; --cream-2:#3f4945; --dim:#5f6965; --muted:#6f7974; --faint:#bec9c3;
  --amber:#236a56; --amber-deep:#0f523f; --amber-soft:rgba(35,106,86,.14);
  --green:#7abea7; --green-deep:#4f947f; --red:#ba1a1a; --blue:#4f7f93; --violet:#904a43;
  --shadow:0 18px 50px -18px rgba(0,0,0,.18);
  --mixer-bar-bg:linear-gradient(#154c3c,#0f3d30); --mixer-bar-fg:#eef8f2;
  --knob-body:#5a7a2c; --knob-arc:#a8d84a; --fader-knob:linear-gradient(#6e8f3a,#4e6b29);
  /* light theme: keep white ARM-on text + lighter brushed metal */
  --arm-on-fg:#fff;
  --mixer-metal:color-mix(in srgb,var(--surface2) 85%,#000 15%);
  --audio-input-port-fg:#eef8f2;
  --input-gain-led:#d8fff0;
  --input-gain-led-glow:rgba(216,255,240,.95);
}
:root[data-theme="solar"]{
  --bg:#1f3130; --bg2:#2a3f3e; --surface:#374F4E; --surface2:#48605d; --surface3:#5f746d;
  --line:rgba(218,204,196,.14); --line-strong:rgba(237,189,149,.27);
  --cream:#DACCC4; --cream-2:#EDBD95; --dim:#c5ad92; --muted:#AA8552; --faint:#6f7464;
  --amber:#694d00; --amber-deep:#4f3a00; --amber-soft:rgba(105,77,0,.18);
  --green:#AA8552; --green-deep:#80623c; --red:#d86d54; --blue:#EDBD95; --violet:#b9906f;
  --shadow:0 18px 50px -18px rgba(0,0,0,.82);
  --mixer-bar-bg:#694d00; --mixer-bar-fg:#f1dec0;
  --audio-input-port-bg:#2b4240;
  --audio-input-port-bg-hover:#374F4E;
  --audio-input-port-checked:#48605d;
  --transport-active-bg:linear-gradient(180deg,#EDBD95,#AA8552);
  --transport-active-fg:#1d251f; --transport-active-border:#EDBD95;
  --transport-active-shadow:0 0 14px rgba(237,189,149,.36), inset 0 1px 0 rgba(255,255,255,.28);
}
:root[data-theme="navy"]{
  --bg:#061826; --bg2:#072A40; --surface:#0f3d56; --surface2:#178CA4; --surface3:#18B7BE;
  --line:rgba(249,247,240,.13); --line-strong:rgba(24,183,190,.28);
  --cream:#F9F7F0; --cream-2:#cde8e8; --dim:#9dc8cf; --muted:#6fa7b4; --faint:#24576b;
  --amber:#18B7BE; --amber-deep:#178CA4; --amber-soft:rgba(24,183,190,.17);
  --green:#6fd2c5; --green-deep:#178CA4; --red:#ff9b82; --blue:#18B7BE; --violet:#a9d7e8;
  --shadow:0 18px 50px -18px rgba(0,0,0,.86);
  --mixer-bar-bg:linear-gradient(#F9F7F0,#cde8e8); --mixer-bar-fg:#072A40;
}

*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#0d0b09;overflow:hidden}
body{font-family:var(--ui);color:var(--cream);-webkit-font-smoothing:antialiased;
  font-size:13px;line-height:1.35;}
#root{height:100vh;width:100vw;display:flex;flex-direction:column}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
button:focus,button:focus-visible,[role=button]:focus,[role=button]:focus-visible,input[type=range]:focus,input[type=range]:focus-visible{outline:none;box-shadow:none}
::selection{background:var(--amber-soft)}
.mono{font-family:var(--mono);font-feature-settings:"tnum"1}

/* scrollbars */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a342c;border-radius:4px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#4a4338}

/* Titlebar & Layout */
.mixer-app{display:flex;flex-direction:column;height:100vh;background:var(--bg);overflow:hidden}
.mixer-titlebar{height:38px;flex:0 0 38px;display:flex;align-items:center;padding:0 14px;
  background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--line);
  user-select:none;-webkit-app-region:drag}
.mixer-titlebar button, .mixer-titlebar .window-controls{-webkit-app-region:no-drag}
.title-c{flex:1;text-align:center;font-size:12.5px;color:var(--dim);letter-spacing:.02em;white-space:nowrap}
.title-c b{color:var(--cream-2);font-weight:600}
.window-controls{height:100%;display:flex;align-items:stretch;flex:0 0 auto;margin-right:-10px}
.window-control{width:46px;height:100%;display:grid;place-items:center;color:var(--cream-2);
  font-size:16px;line-height:1;background:transparent}
.window-control:hover{background:var(--surface2);color:var(--cream)}
.window-control:focus,.window-control:focus-visible{outline:none;box-shadow:none}
.window-control.close:hover{background:#b94a3a;color:#fff}
:root[data-theme="solar"] .mixer-titlebar{background:#694d00;border-color:rgba(241,222,192,.22)}
:root[data-theme="solar"] .title-c,
:root[data-theme="solar"] .title-c b,
:root[data-theme="solar"] .window-control{color:#f1dec0}
:root[data-theme="solar"] .window-control:hover{background:rgba(241,222,192,.14);color:#f1dec0}

/* Knobs & Faders (from studio.html/ui-kit.jsx styles) */
button.btn{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 14px;
  border-radius:8px;background:var(--surface2);color:var(--cream);font-weight:500;font-size:13px;
  border:1px solid var(--line-strong);transition:.12s}
button.btn:hover{background:var(--surface3);border-color:var(--amber-deep)}
.iconbtn{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;
  border-radius:8px;color:var(--cream-2);transition:.12s}
.iconbtn:hover{background:var(--surface2);color:var(--cream)}
.chip{font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  padding:3px 7px;border-radius:5px;background:var(--surface2);color:var(--dim)}
.audio-input-port-select{
  color-scheme:dark;background:var(--audio-input-port-bg,var(--surface2));color:var(--audio-input-port-fg,var(--cream-2));
  border-color:var(--line-strong);box-shadow:inset 0 1px 0 rgba(255,255,255,.045)}
.audio-input-port-select:hover{background:var(--audio-input-port-bg-hover,var(--surface));color:var(--cream)}
.audio-input-port-select:focus{border-color:var(--line-strong);box-shadow:inset 0 1px 0 rgba(255,255,255,.055)}
.audio-input-port-select option{background:var(--bg);color:var(--cream)}
.audio-input-port-select option:checked{background:var(--audio-input-port-checked,var(--surface3));color:var(--cream)}
:root[data-theme="ivory"] .audio-input-port-select,
:root[data-theme="sage"] .audio-input-port-select{color-scheme:light}

/* sleek slider */
.sleek{position:relative;height:15px;cursor:pointer;display:flex;align-items:center}
.sleek .strack{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:4px;
  background:#171309;border-radius:3px;box-shadow:inset 0 1px 2px rgba(0,0,0,.7),inset 0 0 0 1px rgba(0,0,0,.4)}
.sleek .sfill{position:absolute;left:0;top:50%;transform:translateY(-50%);height:4px;border-radius:3px;
  background:linear-gradient(90deg,var(--amber-deep),var(--amber));box-shadow:0 0 7px rgba(232,176,75,.55)}
.sleek .stick{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(232,212,170,.20);top:50%;transform:translate(-50%,-50%)}
.sleek .sthumb{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 34% 30%,#ffe0a0,var(--amber) 70%);
  border:1px solid rgba(0,0,0,.55);box-shadow:0 1px 4px rgba(0,0,0,.6),0 0 0 0 rgba(232,176,75,.4);
  transform:translate(-50%,-50%);transition:width .12s,height .12s,box-shadow .12s}
.sleek:hover .sthumb{width:14px;height:14px;box-shadow:0 1px 5px rgba(0,0,0,.6),0 0 0 4px rgba(232,176,75,.16)}
.sleek:active .sthumb{box-shadow:0 1px 5px rgba(0,0,0,.6),0 0 0 5px rgba(232,176,75,.22)}

.tooltip{position:fixed;z-index:9999;background:#0e0c09;color:var(--cream);font-size:11px;
  padding:4px 8px;border-radius:6px;border:1px solid var(--line-strong);pointer-events:none;
  font-family:var(--mono)}

/* flashing "custom" EQ-name overlay (matches advanced-eq.html) */
@keyframes eq-flash{0%,49%{opacity:1}50%,100%{opacity:0}}
</style>
</head>
<body>
<div id="root"></div>

<script src="build/vendor/react.production.min.js"></script>
<script src="build/vendor/react-dom.production.min.js"></script>

<script>
/* Electron shell tweaks for MacOS Titlebar spacing */
(function () {
  if (!window.electronAPI) return;
  const api = window.electronAPI;
  const style = document.createElement('style');
  const lines = [];
  if (api.platform === 'darwin') {
    lines.push('.mixer-titlebar { padding-left: 80px !important; }');
  } else {
    lines.push('.mixer-titlebar { height:40px !important; flex-basis:40px !important; padding-right:10px !important; }');
  }
  style.textContent = lines.join('\n');
  document.head.appendChild(style);
})();
</script>

<script src="build/ui-kit.js"></script>
<script src="build/ui-mixer.js"></script>
<script src="build/mixer-app.js"></script>
</body>
</html>
