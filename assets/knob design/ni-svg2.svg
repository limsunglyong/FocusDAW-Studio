<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#242427" />
      <stop offset="100%" stop-color="#151517" />
    </radialGradient>

    <linearGradient id="bezel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3e" />
      <stop offset="100%" stop-color="#1a1a1c" />
    </linearGradient>

    <radialGradient id="knob-inner-grad" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#38383c" />
      <stop offset="40%" stop-color="#242427" />
      <stop offset="85%" stop-color="#18181a" />
      <stop offset="100%" stop-color="#0c0c0d" />
    </radialGradient>

    <radialGradient id="knob-light-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="84%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="93%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="98%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="knob-edge-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5" />
    </radialGradient>

    <filter id="led-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <line id="led-tick" x1="0" y1="-117" x2="0" y2="-152" stroke="#f7761e" stroke-width="4" stroke-linecap="round" />
  </defs>

  <rect width="400" height="400" fill="url(#bg-grad)" rx="20" />

  <g transform="translate(200, 200)">
    <circle r="152" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.22" />

    <circle r="150" fill="none" stroke="#1c1c1e" stroke-width="2" />

    <g filter="url(#led-glow)">
      <use href="#led-tick" transform="rotate(-120)" />
      <use href="#led-tick" transform="rotate(-114)" />
      <use href="#led-tick" transform="rotate(-108)" />
      <use href="#led-tick" transform="rotate(-102)" />
      <use href="#led-tick" transform="rotate(-96)" />
      <use href="#led-tick" transform="rotate(-90)" />
      <use href="#led-tick" transform="rotate(-84)" />
      <use href="#led-tick" transform="rotate(-78)" />
      <use href="#led-tick" transform="rotate(-72)" />
      <use href="#led-tick" transform="rotate(-66)" />
      <use href="#led-tick" transform="rotate(-60)" />
      <use href="#led-tick" transform="rotate(-54)" />
      <use href="#led-tick" transform="rotate(-48)" />
      <use href="#led-tick" transform="rotate(-42)" />
      <use href="#led-tick" transform="rotate(-36)" />
      <use href="#led-tick" transform="rotate(-30)" />
      <use href="#led-tick" transform="rotate(-24)" />
      <use href="#led-tick" transform="rotate(-18)" />
      <use href="#led-tick" transform="rotate(-12)" />
      <use href="#led-tick" transform="rotate(-6)" />
      <use href="#led-tick" transform="rotate(0)" />
      <use href="#led-tick" transform="rotate(6)" />
      <use href="#led-tick" transform="rotate(12)" />
      <use href="#led-tick" transform="rotate(18)" />
      <use href="#led-tick" transform="rotate(24)" />
      <use href="#led-tick" transform="rotate(30)" />
      <use href="#led-tick" transform="rotate(36)" />
      <use href="#led-tick" transform="rotate(42)" />
      <use href="#led-tick" transform="rotate(48)" />
      <use href="#led-tick" transform="rotate(54)" />
      <use href="#led-tick" transform="rotate(60)" />
      <use href="#led-tick" transform="rotate(66)" />
      <use href="#led-tick" transform="rotate(72)" />
      <use href="#led-tick" transform="rotate(78)" />
      <use href="#led-tick" transform="rotate(84)" />
      <use href="#led-tick" transform="rotate(90)" />
      <use href="#led-tick" transform="rotate(96)" />
      <use href="#led-tick" transform="rotate(102)" />
      <use href="#led-tick" transform="rotate(108)" />
      <use href="#led-tick" transform="rotate(114)" />
      <use href="#led-tick" transform="rotate(120)" />
    </g>

    <circle r="117" fill="none" stroke="#3a3a3e" stroke-width="1.5" />

    <circle r="115" fill="url(#bezel-grad)" />
    <circle r="112" fill="#151517" />

    <circle r="104" fill="url(#knob-light-glow)" />

    <circle r="98" fill="url(#knob-inner-grad)" />
    <circle r="98" fill="url(#knob-edge-shadow)" />

    <line x1="0" y1="-52" x2="0" y2="-84" stroke="#d4a35b" stroke-width="5" stroke-linecap="round" transform="rotate(-40)" />
  </g>
</svg>
