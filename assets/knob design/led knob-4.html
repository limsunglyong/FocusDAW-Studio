<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Plate -->
  <rect width="200" height="200" rx="20" fill="#131315" />
  
  <!-- Outer Bezel / Housing -->
  <circle cx="100" cy="100" r="92" fill="#1b1b1d" stroke="#39393b" stroke-width="1" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="#0e0e10" stroke-width="4" />
  
  <!-- LED Meter Ring Background (Dimmed) -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#0e0e10" stroke-width="14" />
  
  <!-- LED Ticks (White Signal) -->
  <g fill="none" stroke-width="10" stroke-linecap="butt">
    <!-- Active white segments (approx 3/4 circle) -->
    <path d="M 100 18 A 82 82 0 1 1 50 165" stroke="#ffffff" opacity="0.9" stroke-dasharray="1.5, 2.5" />
    <!-- Inactive dimmed segments -->
    <path d="M 50 165 A 82 82 0 0 1 100 18" stroke="#ffffff" opacity="0.1" stroke-dasharray="1.5, 2.5" />
    
    <!-- Glow for the active portion -->
    <path d="M 100 18 A 82 82 0 1 1 50 165" stroke="#ffffff" stroke-width="2" opacity="0.15" filter="blur(4px)" />
  </g>

  <!-- Knob Shadow -->
  <circle cx="100" cy="105" r="68" fill="black" opacity="0.6" />

  <!-- Premium Dark Metal Knob Gradients -->
  <defs>
    <radialGradient id="classicDarkMetal" cx="50%" cy="50%" r="50%" fx="35%" fy="35%">
      <stop offset="0%" style="stop-color:#39393b" />
      <stop offset="40%" style="stop-color:#1b1b1d" />
      <stop offset="100%" style="stop-color:#0e0e10" />
    </radialGradient>
    
    <linearGradient id="anisotropicSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff; stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#ffffff; stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Knob Main Body -->
  <circle cx="100" cy="100" r="68" fill="url(#classicDarkMetal)" stroke="#39393b" stroke-width="0.5" />
  <circle cx="100" cy="100" r="68" fill="url(#anisotropicSheen)" />
  
  <!-- Subtle Texture Ring on Knob -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="#000000" stroke-width="0.5" stroke-dasharray="0.5, 2" opacity="0.4" />

  <!-- Center Cap Detail -->
  <circle cx="100" cy="100" r="55" fill="#1b1b1d" stroke="#39393b" stroke-width="0.5" />
  <circle cx="100" cy="100" r="55" fill="url(#anisotropicSheen)" opacity="0.5" />

  <!-- Indicator Triangle (White) -->
  <polygon points="100,50 104,58 96,58" fill="#ffffff" transform="rotate(135 100 100)" filter="drop-shadow(0 0 2px rgba(255,255,255,0.5))" />
  
  <!-- Bottom Labels -->
  <g font-family="Inter, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" opacity="0.6" text-anchor="middle">
    <text x="80" y="185">MIN</text>
    <text x="100" y="185" font-size="9" letter-spacing="2">LEVEL</text>
    <text x="120" y="185">MAX</text>
  </g>
</svg>
