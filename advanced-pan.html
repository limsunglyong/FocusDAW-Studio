<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advanced Effect Factory-FocusDAW Studio</title>
<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#1b1712; --bg2:#221d17; --surface:#2a2520; --surface2:#332e27; --surface3:#3d362d;
  --line:rgba(232,212,170,.10); --line-strong:rgba(232,212,170,.18);
  --cream:#efe6d4; --cream-2:#d8cdb6; --dim:#b0a690; --muted:#857c6b; --faint:#5f574a;
  --amber:#e8b04b; --amber-deep:#c8893a; --amber-soft:rgba(232,176,75,.16);
  --green:#94c06a; --green-deep:#6e9a48; --red:#d96a4e; --blue:#7fb0c4; --violet:#c98fb0;
  --shadow:0 18px 50px -18px rgba(0,0,0,.7);
  --ui:"Space Grotesk",system-ui,sans-serif; --mono:"Space Mono",ui-monospace,monospace;
  --r:10px; --mixer-bar-bg:linear-gradient(#efe7d6,#e3d8c0); --mixer-bar-fg:#241a0a;
}
:root[data-theme="ivory"]{
  --bg:#e4dcc8; --bg2:#dad0b8; --surface:#f0ead9; --surface2:#e2dac3; --surface3:#d4caac;
  --line:rgba(95,75,42,.15); --line-strong:rgba(95,75,42,.26);
  --cream:#3b3327; --cream-2:#6e6149; --dim:#8a7d62; --muted:#9a8c6e; --faint:#c8bb9a;
  --amber:#bf7f2e; --amber-deep:#9e6620; --amber-soft:rgba(191,127,46,.14);
  --green:#7c9a4f; --green-deep:#5e7a38; --red:#c2593b; --blue:#5f86a6; --violet:#a0668a;
  --shadow:0 18px 50px -18px rgba(0,0,0,.22); --mixer-bar-bg:linear-gradient(#2a2520,#221d17); --mixer-bar-fg:#efe6d4;
  --knob-cap-1:color-mix(in srgb, var(--amber) 75%, white); --knob-cap-2:var(--amber); --knob-cap-3:var(--amber-deep);
}
:root[data-theme="blue"]{
  --bg:#142841; --bg2:#1c3556; --surface:#274665; --surface2:#33567b; --surface3:#3f6791;
  --line:rgba(180,205,235,.14); --line-strong:rgba(180,205,235,.24);
  --cream:#eaf1fb; --cream-2:#a7b8d0; --dim:#8fa5bf; --muted:#6f82a0; --faint:#4d6680;
  --amber:#5b9bd5; --amber-deep:#3a7bbf; --amber-soft:rgba(91,155,213,.16);
  --green:#3fb985; --green-deep:#2a9068; --red:#e8654a; --blue:#7fb9e8; --violet:#c085c8;
  --shadow:0 18px 50px -18px rgba(0,0,0,.8); --mixer-bar-bg:linear-gradient(#9cccf2,#6fb0e6); --mixer-bar-fg:#0f2640;
}
:root[data-theme="forest"]{
  --bg:#0f1a13; --bg2:#162319; --surface:#1d3022; --surface2:#253d2b; --surface3:#2e4d35;
  --line:rgba(120,200,100,.12); --line-strong:rgba(120,200,100,.22);
  --cream:#d8f0d0; --cream-2:#9ec49a; --dim:#7aaa74; --muted:#5a8656; --faint:#3a5e3a;
  --amber:#5de87a; --amber-deep:#3dc85a; --amber-soft:rgba(93,232,122,.16);
  --green:#aae060; --green-deep:#82b83e; --red:#e06058; --blue:#60b8c8; --violet:#a880c0;
  --shadow:0 18px 50px -18px rgba(0,0,0,.85); --mixer-bar-bg:linear-gradient(#a8e0a0,#7cca74); --mixer-bar-fg:#0c1e0f;
}
:root[data-theme="arctic"]{
  --bg:#041426; --bg2:#022E51; --surface:#12385a; --surface2:#1e4667; --surface3:#2f5876;
  --line:rgba(163,180,200,.15); --line-strong:rgba(204,109,61,.26);
  --cream:#dbe5ef; --cream-2:#A3B4C8; --dim:#8399b4; --muted:#687f9d; --faint:#314f6f;
  --amber:#CC6D3D; --amber-deep:#B74803; --amber-soft:rgba(204,109,61,.18);
  --green:#A3B4C8; --green-deep:#6f849e; --red:#d86d54; --blue:#A3B4C8; --violet:#8da1ba;
  --shadow:0 18px 50px -18px rgba(0,0,0,.85); --mixer-bar-bg:linear-gradient(#CC6D3D,#B74803); --mixer-bar-fg:#061426;
}
:root[data-theme="lime"]{
  --bg:#0c0e0a; --bg2:#151a11; --surface:#1a1e15; --surface2:#20261b; --surface3:#283121;
  --line:rgba(163,230,53,.12); --line-strong:rgba(163,230,53,.22);
  --cream:#e4ead8; --cream-2:#c2c9b4; --dim:#8d9a7d; --muted:#67725b; --faint:#4a533f;
  --amber:#a3e635; --amber-deep:#6fa80f; --amber-soft:rgba(163,230,53,.16);
  --green:#bef264; --green-deep:#84cc16; --red:#ffb4ab; --blue:#bacac3; --violet:#96a69f;
  --shadow:0 18px 50px -18px rgba(0,0,0,.9); --mixer-bar-bg:linear-gradient(#d9ff7a,#a3e635); --mixer-bar-fg:#182404;
}
:root[data-theme="slate"]{
  --bg:#020617; --bg2:#0f172a; --surface:#111827; --surface2:#1e293b; --surface3:#334155;
  --line:rgba(148,163,184,.14); --line-strong:rgba(148,163,184,.26);
  --cream:#f8fafc; --cream-2:#cbd5e1; --dim:#94a3b8; --muted:#64748b; --faint:#475569;
  --amber:#e2e8f0; --amber-deep:#cbd5e1; --amber-soft:rgba(226,232,240,.14);
  --green:#94a3b8; --green-deep:#64748b; --red:#fca5a5; --blue:#cbd5e1; --violet:#94a3b8;
  --shadow:0 18px 50px -18px rgba(0,0,0,.9); --mixer-bar-bg:linear-gradient(#e2e8f0,#cbd5e1); --mixer-bar-fg:#0f172a;
}
:root[data-theme="sage"]{
  --bg:#f7f9f8; --bg2:#eef4f1; --surface:#e7ece9; --surface2:#e1e8e4; --surface3:#d5ded9;
  --line:rgba(63,73,69,.15); --line-strong:rgba(63,73,69,.26);
  --cream:#191c1a; --cream-2:#3f4945; --dim:#5f6965; --muted:#6f7974; --faint:#bec9c3;
  --amber:#236a56; --amber-deep:#0f523f; --amber-soft:rgba(35,106,86,.14);
  --green:#7abea7; --green-deep:#4f947f; --red:#ba1a1a; --blue:#4f7f93; --violet:#904a43;
  --shadow:0 18px 50px -18px rgba(0,0,0,.18); --mixer-bar-bg:linear-gradient(#154c3c,#0f3d30); --mixer-bar-fg:#eef8f2;
  --knob-cap-1:color-mix(in srgb, var(--amber) 75%, white); --knob-cap-2:var(--amber); --knob-cap-3:var(--amber-deep);
}
:root[data-theme="solar"]{
  --bg:#1f3130; --bg2:#2a3f3e; --surface:#374F4E; --surface2:#48605d; --surface3:#5f746d;
  --line:rgba(218,204,196,.14); --line-strong:rgba(237,189,149,.27);
  --cream:#DACCC4; --cream-2:#EDBD95; --dim:#c5ad92; --muted:#AA8552; --faint:#6f7464;
  --amber:#694d00; --amber-deep:#4f3a00; --amber-soft:rgba(105,77,0,.18);
  --green:#AA8552; --green-deep:#80623c; --red:#d86d54; --blue:#EDBD95; --violet:#b9906f;
  --shadow:0 18px 50px -18px rgba(0,0,0,.82); --mixer-bar-bg:#694d00; --mixer-bar-fg:#f1dec0;
}
:root[data-theme="navy"]{
  --bg:#061826; --bg2:#072A40; --surface:#0f3d56; --surface2:#178CA4; --surface3:#18B7BE;
  --line:rgba(249,247,240,.13); --line-strong:rgba(24,183,190,.28);
  --cream:#F9F7F0; --cream-2:#cde8e8; --dim:#9dc8cf; --muted:#6fa7b4; --faint:#24576b;
  --amber:#18B7BE; --amber-deep:#178CA4; --amber-soft:rgba(24,183,190,.17);
  --green:#6fd2c5; --green-deep:#178CA4; --red:#ff9b82; --blue:#18B7BE; --violet:#a9d7e8;
  --shadow:0 18px 50px -18px rgba(0,0,0,.86); --mixer-bar-bg:linear-gradient(#F9F7F0,#cde8e8); --mixer-bar-fg:#072A40;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);overflow:hidden}
body{font-family:var(--ui);color:var(--cream);-webkit-font-smoothing:antialiased;font-size:13px;line-height:1.35}
#root{height:100vh;width:100vw}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
button:focus,button:focus-visible{outline:none;box-shadow:none}
.mono{font-family:var(--mono);font-feature-settings:"tnum"1}
:root{--amber-soft-strong:color-mix(in srgb,var(--amber) 28%,transparent)}
.aef-backdrop{position:fixed;inset:0;background:var(--bg2);display:flex;align-items:stretch;justify-content:stretch;padding:0}
.aef-backdrop::before{content:"";position:absolute;inset:0;opacity:.5;background:repeating-linear-gradient(90deg,transparent 0 78px,var(--line) 78px 79px);pointer-events:none}
.aef-shell{position:relative;z-index:1;width:100%;height:100%;overflow-x:hidden;overflow-y:auto}
.aef-window{width:100%;height:100%;min-width:760px;min-height:620px;background:var(--bg2);border:0;border-radius:0;box-shadow:none;overflow:hidden;display:flex;flex-direction:column}
.aef-titlebar{position:relative;height:38px;flex:0 0 38px;display:flex;align-items:center;gap:14px;padding:0 14px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--line);user-select:none;-webkit-app-region:drag}
.aef-titlebar button,.aef-titlebar .window-controls{-webkit-app-region:no-drag}
.title-c{flex:1;text-align:center;font-size:12.5px;color:var(--dim);letter-spacing:.02em}
.title-c b{color:var(--cream-2);font-weight:600}
.window-controls{height:100%;display:flex;align-items:stretch;flex:0 0 auto;margin-right:-10px;-webkit-app-region:no-drag}
.window-control{width:46px;height:100%;display:grid;place-items:center;color:var(--cream-2);border-radius:0;font-size:16px;line-height:1;background:transparent}
.window-control:hover{background:var(--surface2);color:var(--cream)}
.window-control:focus,.window-control:focus-visible{outline:none;box-shadow:none}
.window-control.close:hover{background:#b94a3a;color:#fff}
:root[data-theme="solar"] .aef-titlebar{background:#694d00;border-color:rgba(241,222,192,.22)}
:root[data-theme="solar"] .title-c,
:root[data-theme="solar"] .title-c b,
:root[data-theme="solar"] .window-control{color:#f1dec0}
:root[data-theme="solar"] .window-control:hover{background:rgba(241,222,192,.14);color:#f1dec0}
.aef-brand{display:flex;align-items:center;gap:8px}
.aef-brand-icon{flex:0 0 auto;color:var(--amber);filter:drop-shadow(0 0 6px var(--amber-soft))}
.aef-toolbar-label{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--muted)}
.aef-viewmenu{position:relative;-webkit-app-region:no-drag}
.aef-viewmenu-btn{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--cream-2);background:var(--surface2);border:1px solid var(--line-strong);border-radius:7px;padding:6px 11px}
.aef-viewmenu-btn:hover,.aef-viewmenu-btn.open{border-color:var(--amber);color:var(--cream)}
.aef-viewmenu-btn:focus,.aef-viewmenu-btn:focus-visible{outline:none}
.aef-viewmenu-caret{opacity:.7;flex:0 0 auto;transition:transform .15s ease}
.aef-viewmenu-btn.open .aef-viewmenu-caret{transform:rotate(180deg)}
.aef-viewmenu-list{position:absolute;top:calc(100% + 6px);left:0;min-width:166px;display:flex;flex-direction:column;gap:2px;padding:5px;background:var(--surface);border:1px solid var(--line-strong);border-radius:9px;box-shadow:0 12px 30px rgba(0,0,0,.5);z-index:50}
.aef-viewmenu-item{text-align:left;font-size:11.5px;font-weight:600;color:var(--cream-2);background:transparent;border:none;border-radius:6px;padding:8px 10px;cursor:pointer}
.aef-viewmenu-item:hover{background:var(--surface2);color:var(--cream)}
.aef-viewmenu-item.active{color:var(--mixer-bar-fg);background:var(--amber)}
.aef-viewmenu-item:focus,.aef-viewmenu-item:focus-visible{outline:none}
.aef-selected-line{font-size:11.5px;color:var(--dim);max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aef-reset{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-2);background:var(--surface2);border:1px solid var(--line-strong);border-radius:7px;padding:7px 12px}
.aef-reset:hover{border-color:var(--amber);color:var(--cream)}
.aef-room{position:relative;width:100%;min-height:320px;flex:1 1 auto;background:var(--bg);overflow:hidden}
.aef-room *{user-select:none}
.aef-node{position:absolute;transform:translate(-50%,-50%);touch-action:none;cursor:grab}
.aef-node:active{cursor:grabbing}
.aef-node-label{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:7px;max-width:132px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;color:var(--cream-2);background:rgba(20,16,11,.82);border:1px solid var(--line);pointer-events:none}
.aef-node-label.selected{color:var(--mixer-bar-fg);background:var(--amber);box-shadow:0 0 10px var(--amber-soft);border-color:var(--amber)}
/* Light themes (Classical Ivory / Sage Mist): --cream-2 is a dark colour, so an
   unselected label reads as dark-on-dark over the fixed dark label background.
   Use the theme's bright on-dark colour (--mixer-bar-fg) for legibility. */
:root[data-theme="ivory"] .aef-node-label:not(.selected),
:root[data-theme="sage"] .aef-node-label:not(.selected){color:var(--mixer-bar-fg)}
.aef-token{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 50% 36%,var(--surface2),var(--bg));border:1.5px solid currentColor;box-shadow:0 7px 18px -7px #000,0 0 0 4px color-mix(in srgb,currentColor 8%,transparent),inset 0 1px 0 rgba(255,240,210,.06);transform-origin:center}
.aef-token.selected{border-width:2px;box-shadow:0 10px 24px -6px #000,0 0 22px color-mix(in srgb,currentColor 55%,transparent),0 0 0 5px var(--amber-soft),inset 0 1px 0 rgba(255,240,210,.08)}
.aef-token.active{filter:drop-shadow(0 0 12px var(--amber-soft))}
.aef-vol{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:6px;white-space:nowrap;font-family:var(--mono);font-size:9.5px;color:var(--faint);opacity:.65}
.aef-vol.selected{color:var(--dim);opacity:1}
/* Vertical gain fader overlay — appears on the right of the spatial field when a
   track is selected. Linear-in-gain (0..2) so it tracks the radial rings/node. */
/* Fixed width so the rail stays put when the dB readout changes digit count
   (e.g. +1.9 dB -> -11.0 dB); everything is centered on a constant axis. */
.aef-gain-overlay{position:absolute;right:24px;top:50%;transform:translateY(-50%);width:108px;height:min(76%,360px);display:flex;flex-direction:column;align-items:center;gap:9px;z-index:500}
.aef-gain-head{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;text-align:center}
.aef-gain-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.aef-gain-val{font-size:11px;color:var(--cream-2)}
.aef-gain-rail{position:relative;flex:1 1 auto;width:34px;border-radius:18px;background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--line-strong);box-shadow:inset 0 2px 8px rgba(0,0,0,.45);cursor:ns-resize;touch-action:none}
.aef-gain-fill{position:absolute;left:0;right:0;bottom:0;border-radius:0 0 17px 17px;background:linear-gradient(180deg,color-mix(in srgb,var(--gain-color,var(--amber)) 68%,transparent),color-mix(in srgb,var(--gain-color,var(--amber)) 18%,transparent));pointer-events:none}
.aef-gain-tick{position:absolute;right:100%;pointer-events:none}
.aef-gain-tick::before{content:"";position:absolute;right:3px;top:0;width:8px;height:1px;background:var(--line-strong);transform:translateY(-50%)}
.aef-gain-tick.zero::before{background:var(--amber-deep);width:11px;height:1.6px}
.aef-gain-tick-label{position:absolute;right:13px;top:0;transform:translateY(-50%);font-size:9px;color:var(--faint);white-space:nowrap}
.aef-gain-tick.zero .aef-gain-tick-label{color:var(--amber-deep);font-weight:700}
.aef-gain-thumb{position:absolute;left:50%;width:42px;height:16px;border-radius:6px;transform:translate(-50%,50%);background:linear-gradient(180deg,var(--surface3),var(--surface2));border:1.5px solid var(--gain-color,var(--amber));box-shadow:0 4px 10px -3px #000,0 0 10px var(--amber-soft);pointer-events:none}
.aef-gain-thumb::after{content:"";position:absolute;left:8px;right:8px;top:50%;height:2px;transform:translateY(-50%);background:var(--gain-color,var(--amber));border-radius:2px;opacity:.85}
.aef-gain-cap{font-size:8.5px;font-weight:700;letter-spacing:.14em;color:var(--faint);text-transform:uppercase}
/* Saturation (peak*gain > 1.0): red glow mirroring the studio waveform clip overlay. */
.aef-gain-overlay.saturating .aef-gain-rail{border-color:rgba(220,70,60,.85);box-shadow:inset 0 2px 8px rgba(0,0,0,.45),0 0 14px rgba(220,70,60,.65),0 0 4px rgba(220,70,60,.9)}
.aef-gain-overlay.saturating .aef-gain-thumb{border-color:rgba(230,80,70,.95);box-shadow:0 4px 10px -3px #000,0 0 14px rgba(220,70,60,.8)}
.aef-gain-overlay.saturating .aef-gain-thumb::after{background:rgba(235,90,80,.95)}
.aef-gain-overlay.saturating .aef-gain-val{color:#e8503a;font-weight:700}
.aef-knobs-wrap{position:relative;flex:0 0 auto}
.aef-knobs{background:linear-gradient(180deg,var(--surface),var(--bg2));border-top:1px solid var(--line);padding:16px 14px 18px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none}
.aef-knobs::-webkit-scrollbar{display:none}
.aef-scroll-arrow{position:absolute;top:0;bottom:0;width:78px;display:grid;place-items:center;border:none;background:transparent;padding:0;z-index:6;cursor:pointer}
.aef-scroll-arrow.left{left:0;justify-items:start;padding-left:8px;background:linear-gradient(90deg,var(--surface) 12%,transparent)}
.aef-scroll-arrow.right{right:0;justify-items:end;padding-right:8px;background:linear-gradient(270deg,var(--surface) 12%,transparent)}
.aef-scroll-disc{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;color:var(--cream-2);background:color-mix(in srgb,var(--surface3) 88%,transparent);border:1px solid var(--line-strong);box-shadow:0 6px 16px -6px #000,inset 0 1px 0 rgba(255,242,214,.06);transition:color .15s,border-color .15s,box-shadow .15s,transform .15s}
.aef-scroll-disc svg{width:30px;height:30px}
.aef-scroll-arrow:hover .aef-scroll-disc{color:var(--amber);border-color:var(--amber);box-shadow:0 0 22px var(--amber-soft),0 0 9px var(--amber-soft),inset 0 0 8px var(--amber-soft);transform:scale(1.06)}
.aef-scroll-arrow:active .aef-scroll-disc{transform:scale(.96)}
.aef-scroll-arrow:focus,.aef-scroll-arrow:focus-visible{outline:none}
.aef-knob-row{display:flex;gap:6px;min-width:max-content;justify-content:safe center}
/* --ks: knob scale (set inline per cell, 0.6..1). Track-name font stays fixed. */
.aef-knob-cell{width:calc(140px*var(--ks,1));flex:0 0 calc(140px*var(--ks,1));display:flex;flex-direction:column;align-items:center;gap:calc(7px*var(--ks,1));padding:calc(12px*var(--ks,1)) calc(9px*var(--ks,1)) calc(11px*var(--ks,1));border-radius:11px;cursor:pointer;box-shadow:inset 0 0 0 1px transparent}
.aef-knob-cell.selected{background:var(--amber-soft);box-shadow:inset 0 0 0 1px var(--amber-soft-strong)}
.aef-knob-title{display:flex;align-items:baseline;gap:6px;max-width:100%;width:100%;min-width:0}
.aef-knob-title .mono{font-size:10px;color:var(--faint)}
.aef-knob-title span:last-child{font-size:11.5px;font-weight:600;color:var(--cream-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aef-knob-body{display:flex;align-items:center;justify-content:center;gap:calc(5px*var(--ks,1));width:100%;padding-left:calc(6px*var(--ks,1))}
.aef-pan-svg{cursor:ns-resize;touch-action:none;width:calc(100px*var(--ks,1));height:calc(100px*var(--ks,1))}
.aef-track-meter{display:flex;flex-direction:column-reverse;gap:1.5px;flex:0 0 auto}
.aef-knob-pointer{filter:drop-shadow(0 0 4px rgba(243,234,216,.4)); transition:filter 0.15s ease}
.aef-pan-svg:hover .aef-knob-pointer{filter:drop-shadow(0 0 8px var(--amber))}
.aef-led{filter:drop-shadow(0 0 3px currentColor)}
.aef-pan-readout{font-family:var(--mono);font-size:calc(13px*var(--ks,1));font-weight:700;letter-spacing:.04em}
.aef-mini-bar{position:relative;width:calc(92px*var(--ks,1));height:calc(9px*var(--ks,1));display:flex;align-items:center}
.aef-mini-bar::before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;transform:translateY(-50%);background:var(--surface2);border-radius:2px}
.aef-mini-center{position:absolute;left:50%;top:1px;bottom:1px;width:1px;background:var(--faint)}
.aef-mini-dot{position:absolute;top:50%;width:calc(9px*var(--ks,1));height:calc(9px*var(--ks,1));border-radius:50%;transform:translate(-50%,-50%)}
.aef-pan-caption{font-size:calc(8.5px*var(--ks,1));font-weight:700;letter-spacing:.12em;color:var(--faint);text-transform:uppercase}
.aef-empty{width:100%;min-width:520px;padding:32px;text-align:center;color:var(--muted);font-size:12px}
.aef-footer{height:30px;flex:0 0 30px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg);border-top:1px solid rgba(0,0,0,.4);font-size:10.5px;color:var(--faint)}
</style>
