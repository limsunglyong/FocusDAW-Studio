<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FocusDAW Studio</title>
<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Orbitron:wght@400&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<!-- Key read-out fonts (separate links so a missing family can't break the line above) -->
<link href="https://fonts.googleapis.com/css2?family=Elms+Sans&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Tai+Heritage+Pro&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#1b1712; --bg2:#221d17; --surface:#2a2520; --surface2:#332e27; --surface3:#3d362d;
  --line:rgba(232,212,170,.10); --line-strong:rgba(232,212,170,.18);
  --cream:#efe6d4; --cream-2:#d8cdb6; --dim:#b0a690; --muted:#857c6b; --faint:#5f574a;
  --amber:#e8b04b; --amber-deep:#c8893a; --amber-soft:rgba(232,176,75,.16);
  /* readable text color on a solid --amber (accent) fill — overridden per theme where the accent is dark */
  --accent-fg:#241a0a;
  --green:#94c06a; --green-deep:#6e9a48; --red:#d96a4e; --blue:#7fb0c4; --violet:#c98fb0;
  --shadow:0 18px 50px -18px rgba(0,0,0,.7);
  --ui:"Space Grotesk",system-ui,sans-serif; --mono:"Space Mono",ui-monospace,monospace; --bpm-number-font:"Orbitron",var(--mono);
  /* Key read-out: value in Elms Sans, accidentals (# / b) in Tai Heritage Pro italic */
  --key-number-font:"Elms Sans",var(--bpm-number-font); --key-accidental-font:"Tai Heritage Pro",serif;
  --r:10px;
  /* Mixer window title bar — contrasts with the track area per theme */
  --mixer-bar-bg:linear-gradient(#efe7d6,#e3d8c0); --mixer-bar-fg:#241a0a;
  /* OUTPUT FX (master) track label — darker than normal tracks per theme */
  --outfx-bg:linear-gradient(rgba(0,0,0,.26),rgba(0,0,0,.26)), linear-gradient(180deg,var(--surface),var(--bg2)); --outfx-fg:var(--amber);
  --audio-in-track-bg:linear-gradient(180deg,color-mix(in srgb,var(--surface) 80%,var(--blue) 20%),color-mix(in srgb,var(--bg2) 88%,var(--blue) 12%));
  --outfx-chip-off-fg:var(--faint);
  --bpm-bg:linear-gradient(180deg,#17120d,#0e0c09); --bpm-fg:var(--cream); --bpm-label-fg:var(--cream-2);
}
/* ── Classical Ivory theme ── */
:root[data-theme="ivory"]{
  --bg:#e4dcc8; --bg2:#dad0b8; --surface:#f0ead9; --surface2:#e2dac3; --surface3:#d4caac;
  --line:rgba(95,75,42,.15); --line-strong:rgba(95,75,42,.26);
  --cream:#3b3327; --cream-2:#6e6149; --dim:#8a7d62; --muted:#9a8c6e; --faint:#c8bb9a;
  --amber:#bf7f2e; --amber-deep:#9e6620; --amber-soft:rgba(191,127,46,.14);
  --green:#7c9a4f; --green-deep:#5e7a38; --red:#c2593b; --blue:#5f86a6; --violet:#a0668a;
  --shadow:0 18px 50px -18px rgba(0,0,0,.22);
  --mixer-bar-bg:linear-gradient(#2a2520,#221d17); --mixer-bar-fg:#efe6d4;
  --outfx-bg:linear-gradient(#37322a,#2b271f); --outfx-fg:#efe6d4;
  --outfx-chip-off-fg:var(--cream-2);
  --bpm-bg:linear-gradient(180deg,#332b20,#211b13); --bpm-fg:#efe6d4; --bpm-label-fg:#d8cdb6;
  --pan-arc:#c9a227;
}
:root[data-theme="ivory"] html,
:root[data-theme="ivory"] body{ background:#cfc6ae; }
:root[data-theme="ivory"] ::-webkit-scrollbar-thumb{ background:#c9bfa8; border-color:var(--bg); }
:root[data-theme="ivory"] ::-webkit-scrollbar-thumb:hover{ background:#b8ae97; }
:root[data-theme="ivory"] button.btn.primary{ color:#f8f3e8; }

/* ── Modern Blue theme ── */
:root[data-theme="blue"]{
  --bg:#142841; --bg2:#1c3556; --surface:#274665; --surface2:#33567b; --surface3:#3f6791;
  --line:rgba(180,205,235,.14); --line-strong:rgba(180,205,235,.24);
  --cream:#eaf1fb; --cream-2:#a7b8d0; --dim:#8fa5bf; --muted:#6f82a0; --faint:#4d6680;
  --amber:#5b9bd5; --amber-deep:#3a7bbf; --amber-soft:rgba(91,155,213,.16);
  --green:#3fb985; --green-deep:#2a9068; --red:#e8654a; --blue:#7fb9e8; --violet:#c085c8;
  --shadow:0 18px 50px -18px rgba(0,0,0,.8);
  --mixer-bar-bg:linear-gradient(#9cccf2,#6fb0e6); --mixer-bar-fg:#0f2640;
  --bpm-bg:linear-gradient(180deg,#0e2238,#081522); --bpm-fg:#eaf1fb; --bpm-label-fg:#a7b8d0;
}

/* ── Forest Green theme ── */
:root[data-theme="forest"]{
  --bg:#0f1a13; --bg2:#162319; --surface:#1d3022; --surface2:#253d2b; --surface3:#2e4d35;
  --line:rgba(120,200,100,.12); --line-strong:rgba(120,200,100,.22);
  --cream:#d8f0d0; --cream-2:#9ec49a; --dim:#7aaa74; --muted:#5a8656; --faint:#3a5e3a;
  --amber:#5de87a; --amber-deep:#3dc85a; --amber-soft:rgba(93,232,122,.16);
  --green:#aae060; --green-deep:#82b83e; --red:#e06058; --blue:#60b8c8; --violet:#a880c0;
  --shadow:0 18px 50px -18px rgba(0,0,0,.85);
  --mixer-bar-bg:linear-gradient(#a8e0a0,#7cca74); --mixer-bar-fg:#0c1e0f;
  --outfx-bg:linear-gradient(rgba(0,0,0,.32),rgba(0,0,0,.32)), linear-gradient(180deg,var(--surface),var(--bg2)); --outfx-fg:var(--amber);
  --bpm-bg:linear-gradient(180deg,#0b160f,#050d07); --bpm-fg:#d8f0d0; --bpm-label-fg:#9ec49a;
}

/* ── Arctic Frost theme ── */
:root[data-theme="arctic"]{
  --bg:#0b1326; --bg2:#131b2e; --surface:#171f33; --surface2:#222a3e; --surface3:#2d3449;
  --line:rgba(187,202,191,.14); --line-strong:rgba(187,202,191,.24);
  --cream:#dbe2fd; --cream-2:#bbcabf; --dim:#86948a; --muted:#66756d; --faint:#3c4a42;
  --amber:#22d3ee; --amber-deep:#0891b2; --amber-soft:rgba(34,211,238,.16);
  --green:#6ffbbe; --green-deep:#00a572; --red:#ffb4ab; --blue:#95d3ba; --violet:#b1f0d6;
  --shadow:0 18px 50px -18px rgba(0,0,0,.85);
  --mixer-bar-bg:linear-gradient(#8de9f7,#22d3ee); --mixer-bar-fg:#062533;
  --outfx-bg:linear-gradient(rgba(0,0,0,.32),rgba(0,0,0,.32)), linear-gradient(180deg,var(--surface),var(--bg2)); --outfx-fg:var(--amber);
  --bpm-bg:linear-gradient(180deg,#071126,#030816); --bpm-fg:#dbe2fd; --bpm-label-fg:#bbcabf;
}

/* ── Neon Lime theme ── */
:root[data-theme="lime"]{
  --bg:#0c0e0a; --bg2:#151a11; --surface:#1a1e15; --surface2:#20261b; --surface3:#283121;
  --line:rgba(163,230,53,.12); --line-strong:rgba(163,230,53,.22);
  --cream:#e4ead8; --cream-2:#c2c9b4; --dim:#8d9a7d; --muted:#67725b; --faint:#4a533f;
  --amber:#a3e635; --amber-deep:#6fa80f; --amber-soft:rgba(163,230,53,.16);
  --green:#bef264; --green-deep:#84cc16; --red:#ffb4ab; --blue:#bacac3; --violet:#96a69f;
  --shadow:0 18px 50px -18px rgba(0,0,0,.9);
  --mixer-bar-bg:linear-gradient(#d9ff7a,#a3e635); --mixer-bar-fg:#182404;
  --outfx-bg:linear-gradient(rgba(0,0,0,.34),rgba(0,0,0,.34)), linear-gradient(180deg,var(--surface),var(--bg2)); --outfx-fg:var(--amber);
  --bpm-bg:linear-gradient(180deg,#0b1007,#050703); --bpm-fg:#e4ead8; --bpm-label-fg:#c2c9b4;
}

/* ── Minimal Slate theme ── */
:root[data-theme="slate"]{
  --bg:#020617; --bg2:#0f172a; --surface:#111827; --surface2:#1e293b; --surface3:#334155;
  --line:rgba(148,163,184,.14); --line-strong:rgba(148,163,184,.26);
  --cream:#f8fafc; --cream-2:#cbd5e1; --dim:#94a3b8; --muted:#64748b; --faint:#475569;
  --amber:#e2e8f0; --amber-deep:#cbd5e1; --amber-soft:rgba(226,232,240,.14);
  --green:#94a3b8; --green-deep:#64748b; --red:#fca5a5; --blue:#cbd5e1; --violet:#94a3b8;
  --shadow:0 18px 50px -18px rgba(0,0,0,.9);
  --mixer-bar-bg:linear-gradient(#e2e8f0,#cbd5e1); --mixer-bar-fg:#0f172a;
  --outfx-bg:linear-gradient(rgba(0,0,0,.36),rgba(0,0,0,.36)), linear-gradient(180deg,var(--surface),var(--bg2)); --outfx-fg:var(--amber);
  --bpm-bg:linear-gradient(180deg,#050a18,#02040d); --bpm-fg:#f8fafc; --bpm-label-fg:#cbd5e1;
}

/* ── Sage Mist theme ── */
:root[data-theme="sage"]{
  --bg:#f7f9f8; --bg2:#eef4f1; --surface:#e7ece9; --surface2:#e1e8e4; --surface3:#d5ded9;
  --line:rgba(63,73,69,.15); --line-strong:rgba(63,73,69,.26);
  --cream:#191c1a; --cream-2:#3f4945; --dim:#5f6965; --muted:#6f7974; --faint:#bec9c3;
  --amber:#236a56; --amber-deep:#0f523f; --amber-soft:rgba(35,106,86,.14);
  --accent-fg:#eef8f2; /* sage accent is a dark teal → needs light text */
  --green:#7abea7; --green-deep:#4f947f; --red:#ba1a1a; --blue:#4f7f93; --violet:#904a43;
  --shadow:0 18px 50px -18px rgba(0,0,0,.18);
  --mixer-bar-bg:linear-gradient(#154c3c,#0f3d30); --mixer-bar-fg:#eef8f2;
  --outfx-bg:linear-gradient(#154c3c,#0f3d30); --outfx-fg:#eef8f2; --eq-graph-bg:#000;
  --bpm-bg:linear-gradient(180deg,#12372c,#092019); --bpm-fg:#eef8f2; --bpm-label-fg:#cfe0d8;
  --knob-body:#5a7a2c; --knob-arc:#a8d84a; --fader-knob:linear-gradient(#6e8f3a,#4e6b29);
}
:root[data-theme="sage"] html,
:root[data-theme="sage"] body{ background:#e4ece7; }
:root[data-theme="sage"] button.btn.primary{ color:#f7f9f8; }

/* ── Solar Gold theme ── */
:root[data-theme="solar"]{
  --bg:#1c1917; --bg2:#292524; --surface:#292524; --surface2:#44403c; --surface3:#57534e;
  --line:rgba(254,243,199,.13); --line-strong:rgba(254,243,199,.24);
  --cream:#fef3c7; --cream-2:#d6d3d1; --dim:#a8a29e; --muted:#78716c; --faint:#57534e;
  --amber:#fbbf24; --amber-deep:#f59e0b; --amber-soft:rgba(251,191,36,.16);
  --green:#84cc16; --green-deep:#65a30d; --red:#f87171; --blue:#38bdf8; --violet:#d97706;
  --shadow:0 18px 50px -18px rgba(0,0,0,.82);
  --mixer-bar-bg:linear-gradient(#fde68a,#fbbf24); --mixer-bar-fg:#451a03;
  --outfx-bg:linear-gradient(rgba(0,0,0,.28),rgba(0,0,0,.28)), linear-gradient(180deg,var(--surface),var(--bg2)); --outfx-fg:var(--amber);
  --bpm-bg:linear-gradient(180deg,#18110a,#0d0905); --bpm-fg:#fef3c7; --bpm-label-fg:#d6d3d1;
}

/* ── Slate Navy theme ── */
:root[data-theme="navy"]{
  --bg:#0e1416; --bg2:#161d1e; --surface:#1a2122; --surface2:#252b2c; --surface3:#2f3637;
  --line:rgba(187,201,204,.14); --line-strong:rgba(187,201,204,.25);
  --cream:#dde3e5; --cream-2:#bbc9cc; --dim:#869396; --muted:#677579; --faint:#3c494c;
  --amber:#44d8f1; --amber-deep:#00bcd4; --amber-soft:rgba(68,216,241,.16);
  --green:#64d8a7; --green-deep:#2fa77b; --red:#ffb4ab; --blue:#44d8f1; --violet:#bdc2ff;
  --shadow:0 18px 50px -18px rgba(0,0,0,.86);
  --mixer-bar-bg:linear-gradient(#89e9f7,#44d8f1); --mixer-bar-fg:#001f25;
  --outfx-bg:linear-gradient(rgba(0,0,0,.32),rgba(0,0,0,.32)), linear-gradient(180deg,var(--surface),var(--bg2)); --outfx-fg:var(--amber);
  --bpm-bg:linear-gradient(180deg,#081114,#04090a); --bpm-fg:#dde3e5; --bpm-label-fg:#bbc9cc;
}

*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#0d0b09;overflow:hidden}
body{font-family:var(--ui);color:var(--cream);-webkit-font-smoothing:antialiased;
  font-size:13px;line-height:1.35;}
#root{height:100vh;width:100vw}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
button:focus,button:focus-visible,[role=button]:focus,[role=button]:focus-visible,input[type=range]:focus,input[type=range]:focus-visible{outline:none;box-shadow:none}
::selection{background:var(--amber-soft)}
.mono{font-family:var(--mono);font-feature-settings:"tnum"1}
.track-title-marquee{min-width:0;flex:1;overflow:hidden;white-space:nowrap}
.track-title-text{display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;vertical-align:top}
.track-title-marquee.is-overflowing:hover .track-title-text,
.track-title-marquee.is-overflowing:focus-within .track-title-text{max-width:none;
  animation:trackTitleMarquee var(--marquee-duration,7s) ease-in-out infinite alternate}
@keyframes trackTitleMarquee{
  from{transform:translateX(0)}
  to{transform:translateX(calc(-1 * var(--marquee-distance,0px)))}
}
@media (prefers-reduced-motion:reduce){
  .track-title-marquee.is-overflowing:hover .track-title-text,
  .track-title-marquee.is-overflowing:focus-within .track-title-text{animation:none;transform:none}
}
/* scrollbars */
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a342c;border-radius:6px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#4a4338}
.theme-scroll,.release-notes-scroll{scrollbar-color:var(--surface3) transparent;scrollbar-width:thin}
.theme-scroll::-webkit-scrollbar,.release-notes-scroll::-webkit-scrollbar{width:11px;height:11px}
.theme-scroll::-webkit-scrollbar-track,.release-notes-scroll::-webkit-scrollbar-track{background:transparent}
.theme-scroll::-webkit-scrollbar-thumb,.release-notes-scroll::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:6px;border:3px solid var(--bg2)}
.theme-scroll::-webkit-scrollbar-thumb:hover,.release-notes-scroll::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--surface3) 72%,var(--cream) 28%)}
.theme-scroll::-webkit-scrollbar-corner,.release-notes-scroll::-webkit-scrollbar-corner{background:transparent}
/* Arrange timeline: keep horizontal scrolling available through the minimap,
   Shift+wheel and trackpads, but hide its native bar. The transparent corner
   also removes the white square where the two native scrollbars intersect. */
[data-arrange-scroll]::-webkit-scrollbar{width:11px;height:0}
[data-arrange-scroll]::-webkit-scrollbar-thumb{
  background:color-mix(in srgb,var(--amber) 55%,var(--bg));
  border:3px solid var(--bg)}
[data-arrange-scroll]::-webkit-scrollbar-thumb:hover{
  background:color-mix(in srgb,var(--amber) 75%,var(--bg))}
[data-arrange-scroll]::-webkit-scrollbar-corner{background:transparent}

/* ---- app window shell ---- */
.app{height:100vh;display:flex;flex-direction:column;background:var(--bg);
  border-radius:0;overflow:hidden}
.titlebar{height:38px;flex:0 0 38px;display:flex;align-items:center;gap:14px;
  padding:0 14px;background:linear-gradient(180deg,var(--bg2),var(--bg));
  border-bottom:1px solid var(--line);user-select:none}
.lights{display:flex;gap:8px}
.light{width:12px;height:12px;border-radius:50%}
.l-r{background:#e0604d} .l-y{background:#e3b341} .l-g{background:#71b56a}
.title-c{flex:1;text-align:center;font-size:12.5px;color:var(--dim);letter-spacing:.02em}
.title-c b{color:var(--cream-2);font-weight:600}
.title-badge{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--amber);
  border:1px solid var(--amber-deep);padding:2px 7px;border-radius:5px;text-transform:uppercase}
.menubar{height:36px;flex:0 0 36px;display:flex;align-items:stretch;gap:1px;position:relative;
  padding:0 10px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--line-strong);user-select:none}
.menu-item{display:flex;align-items:center;padding:0 11px;font-size:12.5px;color:var(--cream-2);
  border-radius:6px;margin:5px 0;cursor:pointer}
.menu-item:hover{background:var(--surface)}
.project-name-edit{position:relative;z-index:4;-webkit-app-region:no-drag}
.window-controls{height:100%;display:flex;align-items:stretch;flex:0 0 auto;margin-right:-10px;
  -webkit-app-region:no-drag}
.window-control{width:46px;height:100%;display:grid;place-items:center;color:var(--cream-2);
  border-radius:0;font-size:16px;line-height:1;background:transparent}
.window-control:hover{background:var(--surface2);color:var(--cream)}
.window-control:focus,.window-control:focus-visible{outline:none;box-shadow:none}
.window-control.close:hover{background:#b94a3a;color:#fff}
.bottombar{height:24px;flex:0 0 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:0 12px;background:linear-gradient(180deg,var(--bg2),var(--bg));
  border-top:1px solid var(--line-strong);color:var(--muted);user-select:none}
.bottom-project{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-size:10.5px;color:var(--dim)}
.version-badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;color:var(--dim);
  flex:0 0 auto;border:1px solid var(--line);border-radius:5px;padding:2px 7px;background:rgba(255,255,255,.018)}

button.btn{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 14px;
  border-radius:8px;background:var(--surface2);color:var(--cream);font-weight:500;font-size:13px;
  border:1px solid var(--line-strong);transition:.12s}
button.btn:hover{background:var(--surface3);border-color:var(--amber-deep)}
button.btn.primary{background:var(--amber);color:#241a0a;border-color:var(--amber);font-weight:600}
button.btn.primary:hover{background:color-mix(in srgb, var(--amber) 85%, white);border-color:color-mix(in srgb, var(--amber) 85%, white)}
button.btn.ghost{background:transparent;border-color:transparent}
button.btn.ghost:hover{background:var(--surface)}

.iconbtn{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;
  border-radius:8px;color:var(--cream-2);transition:.12s}
.iconbtn:hover{background:var(--surface2);color:var(--cream)}
.iconbtn.on{background:var(--amber-soft);color:var(--amber)}

.chip{font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  padding:3px 7px;border-radius:5px;background:var(--surface2);color:var(--dim)}

input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:4px;background:#3a342c;border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--amber);margin-top:-4.5px;box-shadow:0 1px 3px rgba(0,0,0,.5)}

.tooltip{position:fixed;z-index:9999;background:#0e0c09;color:var(--cream);font-size:11px;
  padding:4px 8px;border-radius:6px;border:1px solid var(--line-strong);pointer-events:none;
  font-family:var(--mono)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes loadingSweep{from{transform:translateX(-65%)}to{transform:translateX(120%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes bpmPanelIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* Key setup panel "unrolls" downward from the readout box (blind-drop reveal) */
@keyframes keyPanelDrop{from{max-height:0;opacity:.4}to{max-height:360px;opacity:1}}
/* "punch in" effect for a freshly detected / applied BPM number: expand then settle */
@keyframes bpmPop{0%{transform:scale(1.4);opacity:.55}55%{transform:scale(.93)}100%{transform:scale(1);opacity:1}}
.rec-dot{animation:pulse 1.1s ease-in-out infinite}
/* Vari BPM active tag on track header — smooth red blink */
@keyframes variBpmBlink{0%,100%{opacity:1;box-shadow:0 0 8px color-mix(in srgb,var(--red) 55%,transparent)}50%{opacity:.32;box-shadow:0 0 2px color-mix(in srgb,var(--red) 15%,transparent)}}
.vari-bpm-tag{animation:variBpmBlink 1.6s ease-in-out infinite}

/* ---- prominent SAVE button (Mixdown ready) ---- */
@keyframes saveGlow{
  0%,100%{ box-shadow:0 0 14px 1px color-mix(in srgb,var(--amber) 40%,transparent); }
  50%{ box-shadow:0 0 28px 7px color-mix(in srgb,var(--amber) 75%,transparent); }
}
.btn-save{
  display:inline-flex; align-items:center; justify-content:center; gap:9px;
  width:100%; height:48px; padding:0 18px; border-radius:12px;
  font-size:15px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  cursor:pointer; text-decoration:none;
  background:linear-gradient(180deg,var(--amber),var(--amber-deep));
  color:#fff; border:1px solid var(--amber);
  animation:saveGlow 1.5s ease-in-out infinite;
  transition:transform .12s, filter .12s;
}
.btn-save:disabled{ opacity:.6; cursor:default; animation:none; }
.btn-save:hover:not(:disabled){ transform:translateY(-1px); filter:brightness(1.07); }
.btn-save:active:not(:disabled){ transform:translateY(0) scale(.99); }

/* ---- sleek slider ---- */
.sleek{position:relative;height:15px;cursor:pointer;display:flex;align-items:center}
.sleek .strack{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:4px;
  background:#171309;border-radius:3px;box-shadow:inset 0 1px 2px rgba(0,0,0,.7),inset 0 0 0 1px rgba(0,0,0,.4)}
.sleek .sfill{position:absolute;left:0;top:50%;transform:translateY(-50%);height:4px;border-radius:3px;
  background:linear-gradient(90deg,var(--amber-deep),var(--amber));box-shadow:0 0 7px rgba(232,176,75,.55)}
.sleek .stick{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(232,212,170,.20);top:50%;transform:translate(-50%,-50%)}
.sleek .sthumb{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 34% 30%,#ffe0a0,var(--amber) 70%);
  border:1px solid rgba(0,0,0,.55);box-shadow:0 1px 4px rgba(0,0,0,.6),0 0 0 0 rgba(232,176,75,.4);
  transform:translate(-50%,-50%);transition:width .12s,height .12s,box-shadow .12s}
.sleek:hover .sthumb{width:14px;height:14px;box-shadow:0 1px 5px rgba(0,0,0,.6),0 0 0 4px rgba(232,176,75,.16)}
.sleek:active .sthumb{box-shadow:0 1px 5px rgba(0,0,0,.6),0 0 0 5px rgba(232,176,75,.22)}
/* vertical track-list scroll arrows (overlay on the arrange area) */
.arrange-scroll-arrow{position:absolute;left:50%;transform:translateX(-50%);width:auto;display:grid;place-items:center;border:none;background:transparent;padding:0;z-index:20;cursor:pointer}
.arrange-scroll-arrow.up{top:78px}
.arrange-scroll-arrow.down{bottom:16px}
.arrange-scroll-disc{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;color:var(--cream-2);background:color-mix(in srgb,var(--surface3) 90%,transparent);border:1px solid var(--line-strong);box-shadow:0 6px 16px -6px #000,inset 0 1px 0 rgba(255,242,214,.06);transition:color .15s,border-color .15s,box-shadow .15s,transform .15s}
.arrange-scroll-disc svg{width:26px;height:26px}
.arrange-scroll-arrow:hover .arrange-scroll-disc{color:var(--amber);border-color:var(--amber);box-shadow:0 0 22px var(--amber-soft),0 0 9px var(--amber-soft),inset 0 0 8px var(--amber-soft);transform:scale(1.08)}
.arrange-scroll-arrow:active .arrange-scroll-disc{transform:scale(.95)}
.arrange-scroll-arrow:focus,.arrange-scroll-arrow:focus-visible{outline:none}
@keyframes recordBlink{0%,44%{opacity:1}45%,94%{opacity:.22}95%,100%{opacity:1}}
.record-blink{animation:recordBlink 1s steps(1,end) infinite}
.input-level-slider[type=range]{background:transparent}
.input-level-slider[type=range]::-webkit-slider-runnable-track{
  background:transparent!important;box-shadow:none}
/* Prevent accidental text selection and native element/image dragging across the app —
   the "object stuck to the cursor" ghost + the import dropzone dashed outline it triggered.
   Real form inputs stay selectable. The only intended drag is an external OS file drop,
   which relies on neither in-app text selection nor an in-app dragstart. */
body{user-select:none;-webkit-user-select:none;}
input,textarea,select,[contenteditable="true"]{user-select:text;-webkit-user-select:text;}
img,a,svg{-webkit-user-drag:none;}
</style>

<script>
/* Electron shell tweaks — runs before any JSX, window.electronAPI already set by preload */
(function () {
  if (!window.electronAPI) return;
  const api = window.electronAPI;
  const style = document.createElement('style');
  const lines = [
    /* make menubar draggable (moves the window) */
    '.menubar { -webkit-app-region: drag; }',
    /* interactive elements inside must opt out */
    '.menubar button, .menubar input, .menubar [role=button], .menubar .menu-item, .menubar .project-name-edit, .menubar .window-controls { -webkit-app-region: no-drag; }',
  ];
  if (api.platform === 'darwin') {
    /* hiddenInset: traffic lights sit inside the window at top-left */
    lines.push('.menubar { padding-left: 80px !important; }');
  } else {
    lines.push('.menubar { height:40px !important; flex-basis:40px !important; padding-right:10px !important; }');
  }
  style.textContent = lines.join('\n');
  document.head.appendChild(style);
})();

/* Block all internal HTML5 drags (text/element/image "drag ghost" that could start a
   move/copy and light up the file-import dropzone). External OS file drops do NOT fire
   dragstart inside the page, so audio import via drag-and-drop is unaffected. There are
   no legitimate in-app HTML5 drag sources (UI drags use mouse events / app-region). */
document.addEventListener('dragstart', function (e) { e.preventDefault(); }, true);
</script>
